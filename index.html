<!DOCTYPE html>
<html lang="sk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DreamClock</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main id="clockScreen" class="clock-screen">
    <div class="background-dim"></div>

    <section id="clockWrap" class="clock-wrap">
      <div id="analogClock" class="analog-clock">
        <div id="ticks" class="ticks"></div>

        <div class="number number-12">12</div>
        <div class="number number-3">3</div>
        <div class="number number-6">6</div>
        <div class="number number-9">9</div>

        <div id="hourHand" class="hand hour-hand"></div>
        <div id="minuteHand" class="hand minute-hand"></div>
        <div id="secondHand" class="hand second-hand"></div>

        <div class="center-dot"></div>
      </div>
    </section>

    <section id="themeMenu" class="theme-menu">
      <div class="menu-panel">
        <div class="menu-title">DreamClock</div>
        <div id="themeGrid" class="theme-grid"></div>
      </div>
    </section>
  </main>

  <script src="clock.js"></script>
</body>
</html>
